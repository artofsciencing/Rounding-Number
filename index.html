<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rounding Adventure – Arudhra Classes</title>
<link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<style>
  :root {
    --sky: #4fc3f7;
    --sun: #FFD600;
    --grass: #66BB6A;
    --candy: #FF6B9D;
    --purple: #9C6FE4;
    --orange: #FF8C42;
    --white: #FFFDF5;
    --dark: #2D2250;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Nunito', sans-serif;
    background: linear-gradient(160deg, #e0f7fa 0%, #fff9c4 50%, #fce4ec 100%);
    min-height: 100vh;
    padding: 20px;
    overflow-x: hidden;
  }

  /* ── Floating background shapes ── */
  body::before {
    content: '';
    position: fixed; inset: 0; z-index: 0; pointer-events: none;
    background-image:
      radial-gradient(circle at 10% 20%, rgba(255,214,0,.18) 80px, transparent 80px),
      radial-gradient(circle at 90% 10%, rgba(255,107,157,.15) 60px, transparent 60px),
      radial-gradient(circle at 80% 80%, rgba(79,195,247,.18) 100px, transparent 100px),
      radial-gradient(circle at 5%  80%, rgba(156,111,228,.15) 70px, transparent 70px);
  }

  .page-wrap { position: relative; z-index: 1; max-width: 820px; margin: 0 auto; }

  /* ── Header ── */
  header {
    text-align: center;
    padding: 18px 24px 14px;
    background: linear-gradient(135deg, var(--purple), var(--candy));
    border-radius: 28px;
    box-shadow: 0 8px 32px rgba(156,111,228,.35);
    margin-bottom: 24px;
    position: relative;
    overflow: hidden;
  }
  header::after {
    content: '⭐ 🌟 ✨ 🌟 ⭐';
    position: absolute; bottom: -4px; left: 50%; transform: translateX(-50%);
    font-size: 18px; opacity: .35;
  }
  .brand {
    font-family: 'Fredoka One', cursive;
    font-size: 15px;
    color: #FFD600;
    text-shadow: 0 2px 8px rgba(0,0,0,.25);
    letter-spacing: 2px;
    text-transform: uppercase;
    margin-bottom: 4px;
  }
  header h1 {
    font-family: 'Fredoka One', cursive;
    font-size: clamp(26px, 6vw, 40px);
    color: #fff;
    text-shadow: 0 3px 8px rgba(0,0,0,.2);
    line-height: 1.1;
  }
  header p {
    color: rgba(255,255,255,.9);
    font-size: 16px;
    font-weight: 700;
    margin-top: 6px;
  }
  .rocket { display: inline-block; animation: rocket-bob 1.8s ease-in-out infinite; }
  @keyframes rocket-bob {
    0%,100% { transform: translateY(0) rotate(-5deg); }
    50%      { transform: translateY(-8px) rotate(5deg); }
  }

  /* ── Card ── */
  .card {
    background: var(--white);
    border-radius: 28px;
    padding: 28px 28px 32px;
    box-shadow: 0 6px 28px rgba(45,34,80,.1);
    margin-bottom: 22px;
  }

  /* ── Controls ── */
  .controls { display: flex; flex-wrap: wrap; gap: 18px; align-items: flex-end; margin-bottom: 8px; }

  .field { display: flex; flex-direction: column; gap: 8px; flex: 1; min-width: 180px; }
  .field label {
    font-family: 'Fredoka One', cursive;
    font-size: 18px;
    color: var(--dark);
  }
  .field label span { font-size: 22px; }

  input[type="number"] {
    font-family: 'Fredoka One', cursive;
    font-size: 32px;
    padding: 12px 18px;
    border: 4px solid var(--purple);
    border-radius: 18px;
    background: #f3efff;
    color: var(--dark);
    width: 100%;
    outline: none;
    transition: border-color .2s, box-shadow .2s;
    -moz-appearance: textfield;
  }
  input[type="number"]:focus {
    border-color: var(--candy);
    box-shadow: 0 0 0 4px rgba(255,107,157,.2);
  }
  input::-webkit-inner-spin-button { -webkit-appearance: none; }

  .round-btns { display: flex; gap: 10px; flex-wrap: wrap; }
  .round-btn {
    font-family: 'Fredoka One', cursive;
    font-size: 18px;
    padding: 12px 22px;
    border: 4px solid transparent;
    border-radius: 50px;
    cursor: pointer;
    transition: transform .15s, box-shadow .15s, background .15s;
    background: #f0f0f0;
    color: #777;
  }
  .round-btn:hover { transform: translateY(-3px); box-shadow: 0 6px 16px rgba(0,0,0,.12); }
  .round-btn.active-10  { background: var(--orange); color: #fff; border-color: #d4620c; }
  .round-btn.active-100 { background: var(--grass);  color: #fff; border-color: #388e3c; }
  .round-btn.active-1000{ background: var(--sky);    color: var(--dark); border-color: #0288d1; }

  /* ── GO Button ── */
  #goBtn {
    font-family: 'Fredoka One', cursive;
    font-size: 26px;
    padding: 14px 40px;
    background: linear-gradient(135deg, var(--sun), var(--orange));
    color: var(--dark);
    border: 4px solid var(--orange);
    border-radius: 50px;
    cursor: pointer;
    box-shadow: 0 6px 18px rgba(255,140,66,.4);
    transition: transform .15s, box-shadow .15s;
    align-self: center;
    white-space: nowrap;
  }
  #goBtn:hover { transform: scale(1.07); box-shadow: 0 8px 24px rgba(255,140,66,.5); }
  #goBtn:active { transform: scale(.97); }

  /* ── Number Line Canvas ── */
  #lineCanvas {
    width: 100%;
    border-radius: 18px;
    display: block;
  }

  /* ── Answer Box ── */
  .answer-box {
    display: none;
    text-align: center;
    margin-top: 18px;
    padding: 20px 28px;
    border-radius: 22px;
    background: linear-gradient(135deg, #e8f5e9, #c8e6c9);
    border: 4px solid var(--grass);
    animation: pop-in .4s cubic-bezier(.34,1.56,.64,1) both;
  }
  .answer-box.wrong {
    background: linear-gradient(135deg, #fff3e0, #ffe0b2);
    border-color: var(--orange);
  }
  @keyframes pop-in {
    from { transform: scale(.7); opacity: 0; }
    to   { transform: scale(1);  opacity: 1; }
  }
  .answer-emoji { font-size: 48px; display: block; }
  .answer-text  {
    font-family: 'Fredoka One', cursive;
    font-size: clamp(20px, 4vw, 28px);
    color: var(--dark);
    margin-top: 8px;
    line-height: 1.3;
  }
  .answer-text span { color: var(--grass); font-size: 1.3em; }
  .answer-box.wrong .answer-text span { color: var(--orange); }

  /* ── Rule card ── */
  .rule-card {
    display: none;
    background: linear-gradient(135deg, #f3efff, #e8eaff);
    border: 3px dashed var(--purple);
    border-radius: 18px;
    padding: 16px 22px;
    margin-top: 16px;
    font-size: 18px;
    color: var(--dark);
    line-height: 1.6;
  }
  .rule-card b { color: var(--purple); }

  /* ── Tip strip ── */
  .tip-strip {
    background: linear-gradient(90deg, var(--sun) 0%, var(--orange) 100%);
    border-radius: 18px;
    padding: 14px 22px;
    font-size: 18px;
    font-weight: 800;
    color: var(--dark);
    text-align: center;
    box-shadow: 0 4px 14px rgba(255,140,66,.3);
  }
  .tip-strip span { font-size: 22px; }

  /* ── Footer ── */
  footer {
    text-align: center;
    padding: 14px;
    font-size: 14px;
    color: #888;
    font-weight: 700;
  }
</style>
</head>
<body>

<div class="page-wrap">

  <header>
    <div class="brand">Aarudhra's Art of Sciencing</div>
    <h1><span class="rocket">🚀</span> Rounding Adventure!</h1>
    <p>Type a number and watch it SNAP to the nearest 10, 100, or 1000!</p>
  </header>

  <div class="card">
    <div class="controls">
      <div class="field">
        <label><span>🔢</span> Type your number</label>
        <input type="number" id="numInput" placeholder="e.g. 347" min="0" max="9999">
      </div>
      <div class="field">
        <label><span>🎯</span> Round to nearest…</label>
        <div class="round-btns">
          <button class="round-btn active-10" data-val="10"   id="btn10">10</button>
          <button class="round-btn"            data-val="100"  id="btn100">100</button>
          <button class="round-btn"            data-val="1000" id="btn1000">1000</button>
        </div>
      </div>
      <button id="goBtn">🎲 ROUND IT!</button>
    </div>
  </div>

  <div class="card" id="lineCard" style="padding:24px 20px 28px">
    <canvas id="lineCanvas" height="180"></canvas>
    <div class="answer-box" id="answerBox">
      <span class="answer-emoji" id="answerEmoji">🎉</span>
      <div class="answer-text" id="answerText"></div>
    </div>
    <div class="rule-card" id="ruleCard"></div>
  </div>

  <div class="tip-strip">
    <span>💡</span> Rule to remember: If the digit is <b>5 or more → round UP</b> · If it's <b>less than 5 → round DOWN!</b>
  </div>

  <footer>Made with ❤️ for Aarudhra's Art of Sciencing · Year 5 Maths</footer>
</div>

<script>
const canvas  = document.getElementById('lineCanvas');
const ctx     = canvas.getContext('2d');
const input   = document.getElementById('numInput');
const goBtn   = document.getElementById('goBtn');
const ansBox  = document.getElementById('answerBox');
const ansText = document.getElementById('answerText');
const ansEmoji= document.getElementById('answerEmoji');
const ruleCard= document.getElementById('ruleCard');

let selectedRound = 10;
let animFrame = null;

// ── Round-button toggling ──
const btnMap = { 10:'btn10', 100:'btn100', 1000:'btn1000' };
document.querySelectorAll('.round-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.round-btn').forEach(b => {
      b.className = 'round-btn';
    });
    const v = +btn.dataset.val;
    selectedRound = v;
    btn.classList.add('active-' + v);
  });
});

// Start with 10 highlighted
document.getElementById('btn10').classList.add('active-10');

// ── Main trigger ──
goBtn.addEventListener('click', runRound);
input.addEventListener('keydown', e => { if(e.key === 'Enter') runRound(); });

function runRound() {
  const raw = input.value.trim();
  if (raw === '' || isNaN(+raw)) {
    input.style.border = '4px solid #e53935';
    setTimeout(() => input.style.border = '4px solid var(--purple)', 800);
    return;
  }
  const num = Math.max(0, Math.min(99999, Math.round(+raw)));
  drawNumberLine(num, selectedRound);
}

// ── Draw ──
function drawNumberLine(num, round) {
  if (animFrame) cancelAnimationFrame(animFrame);

  // Sizes
  const W = canvas.parentElement.clientWidth - 40;
  canvas.width  = W;
  canvas.height = 200;

  const lo  = Math.floor(num / round) * round;
  const hi  = lo + round;
  const mid = lo + round / 2;

  const roundedVal = (num - lo >= round / 2) ? hi : lo;
  const roundedUp  = roundedVal === hi;

  // Colors per mode
  const modeColor = round === 10 ? '#FF8C42' : round === 100 ? '#66BB6A' : '#4fc3f7';

  // Layout
  const padL = 72, padR = 72;
  const lineY = 108;
  const lineW = W - padL - padR;

  function xOf(v) {
    return padL + ((v - lo) / round) * lineW;
  }

  // Animate ball
  let progress = 0;  // 0→1
  const startX = xOf(num);
  const endX   = xOf(roundedVal);

  function draw(p) {
    ctx.clearRect(0, 0, W, 200);

    // ── Track ──
    ctx.save();
    ctx.beginPath();
    ctx.moveTo(padL - 24, lineY);
    ctx.lineTo(W - padR + 24, lineY);
    ctx.strokeStyle = '#e0e0e0';
    ctx.lineWidth = 8;
    ctx.lineCap = 'round';
    ctx.stroke();
    ctx.restore();

    // ── Coloured filled segment: lo → roundedVal ──
    const fillEnd = padL + ((Math.min(num, roundedVal) - lo + (roundedUp ? 0 : 0)) / round) * lineW;
    ctx.save();
    ctx.beginPath();
    ctx.moveTo(padL, lineY);
    ctx.lineTo(xOf(num) + (endX - startX) * p, lineY);
    ctx.strokeStyle = modeColor + '55';
    ctx.lineWidth = 12;
    ctx.lineCap = 'round';
    ctx.stroke();
    ctx.restore();

    // ── Midpoint dashed vertical ──
    const midX = xOf(mid);
    ctx.save();
    ctx.setLineDash([6,5]);
    ctx.beginPath();
    ctx.moveTo(midX, lineY - 38);
    ctx.lineTo(midX, lineY + 38);
    ctx.strokeStyle = '#9C6FE4';
    ctx.lineWidth = 2.5;
    ctx.stroke();
    ctx.restore();

    // ── Tick marks + labels: lo, mid, hi ──
    [[lo, 'lo'], [mid, 'mid'], [hi, 'hi']].forEach(([v, role]) => {
      const x = xOf(v);
      const isMid = role === 'mid';
      const isAnswer = v === roundedVal && p === 1;

      ctx.save();
      ctx.beginPath();
      ctx.moveTo(x, lineY - (isMid ? 12 : 16));
      ctx.lineTo(x, lineY + (isMid ? 12 : 16));
      ctx.strokeStyle = isMid ? '#9C6FE4' : (isAnswer ? modeColor : '#aaa');
      ctx.lineWidth = isMid ? 2.5 : 3.5;
      ctx.stroke();
      ctx.restore();

      // value label
      ctx.save();
      ctx.font = `bold ${isMid ? 14 : 18}px Nunito`;
      ctx.fillStyle = isMid ? '#9C6FE4' : (isAnswer ? modeColor : '#555');
      ctx.textAlign = 'center';
      ctx.fillText(isMid ? `midpoint\n${v}` : v, x, lineY + 34);
      if(isMid) {
        ctx.font = 'bold 13px Nunito';
        ctx.fillText(`(${v})`, x, lineY + 50);
      }
      ctx.restore();

      // "midpoint" text above
      if(isMid) {
        ctx.save();
        ctx.font = '700 13px Nunito';
        ctx.fillStyle = '#9C6FE4';
        ctx.textAlign = 'center';
        ctx.fillText('midpoint', x, lineY - 46);
        ctx.restore();
      }
    });

    // ── Arrows at line ends ──
    [padL - 24, W - padR + 24].forEach((ax, i) => {
      ctx.save();
      ctx.beginPath();
      const d = i === 0 ? -1 : 1;
      ctx.moveTo(ax, lineY);
      ctx.lineTo(ax - d*14, lineY - 7);
      ctx.lineTo(ax - d*14, lineY + 7);
      ctx.closePath();
      ctx.fillStyle = '#ccc';
      ctx.fill();
      ctx.restore();
    });

    // ── Ball (the entered number) ──
    const ballX = startX + (endX - startX) * p;
    const ballY = lineY - 46 * Math.sin(Math.PI * p); // arc
    const ballR = 22;

    // shadow
    ctx.save();
    ctx.beginPath();
    ctx.ellipse(ballX, lineY + 4, ballR * 0.8, 5, 0, 0, Math.PI*2);
    ctx.fillStyle = 'rgba(0,0,0,.12)';
    ctx.fill();
    ctx.restore();

    // ball body
    ctx.save();
    ctx.beginPath();
    ctx.arc(ballX, ballY, ballR, 0, Math.PI*2);
    const grad = ctx.createRadialGradient(ballX-6, ballY-6, 3, ballX, ballY, ballR);
    grad.addColorStop(0, '#fff9');
    grad.addColorStop(1, modeColor);
    ctx.fillStyle = grad;
    ctx.shadowColor = modeColor + '88';
    ctx.shadowBlur  = 14;
    ctx.fill();
    ctx.restore();

    // ball number
    ctx.save();
    ctx.font = `900 ${num >= 1000 ? 13 : 15}px Fredoka One`;
    ctx.fillStyle = '#fff';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.shadowColor = 'rgba(0,0,0,.3)';
    ctx.shadowBlur = 4;
    ctx.fillText(num, ballX, ballY);
    ctx.restore();

    // ── At end: label the answer tick ──
    if(p === 1) {
      const ax = xOf(roundedVal);
      ctx.save();
      ctx.beginPath();
      ctx.arc(ax, lineY, 10, 0, Math.PI*2);
      ctx.fillStyle = modeColor;
      ctx.shadowColor = modeColor;
      ctx.shadowBlur = 10;
      ctx.fill();
      ctx.restore();
    }
  }

  // Ease in-out
  function ease(t) { return t<0.5 ? 2*t*t : -1+(4-2*t)*t; }

  const FRAMES = 55;
  let f = 0;
  function step() {
    f++;
    const p = ease(Math.min(f / FRAMES, 1));
    draw(p);
    if(f < FRAMES) { animFrame = requestAnimationFrame(step); }
    else {
      draw(1);
      showAnswer(num, roundedVal, roundedUp, round, mid);
    }
  }

  // first draw immediately (ball at start)
  draw(0);
  animFrame = requestAnimationFrame(step);
}

function showAnswer(num, rounded, up, round, mid) {
  ansBox.style.display = 'block';
  ruleCard.style.display = 'block';
  ansBox.className = 'answer-box' + (up ? '' : ' wrong');
  ansBox.style.animation = 'none';
  void ansBox.offsetWidth;
  ansBox.style.animation = '';

  ansEmoji.textContent = up ? '🎉' : '✅';

  const digit = digitToCheck(num, round);
  const word  = round === 10 ? 'ones' : round === 100 ? 'tens' : 'hundreds';

  ansText.innerHTML =
    `<b>${num}</b> rounded to the nearest <b>${round}</b> is <span>${rounded}</span>!`;

  const dir = up
    ? `Since <b>${digit} ≥ 5</b>, we round <b>UP</b> to ${rounded}.`
    : `Since <b>${digit} < 5</b>, we round <b>DOWN</b> to ${rounded}.`;

  ruleCard.innerHTML =
    `🧠 <b>How we did it:</b><br>
    ➡️ Look at the <b>${word}</b> digit: it's <b>${digit}</b>.<br>
    ➡️ The midpoint between ${Math.floor(num/round)*round} and ${Math.floor(num/round)*round + round} is <b>${mid}</b>.<br>
    ➡️ ${num} is <b>${up ? 'at or above' : 'below'}</b> the midpoint.<br>
    ➡️ ${dir}`;
}

function digitToCheck(num, round) {
  if(round === 10)   return num % 10;
  if(round === 100)  return Math.floor(num / 10) % 10;
  if(round === 1000) return Math.floor(num / 100) % 10;
}

// Draw empty line on load
window.addEventListener('load', () => {
  const W = canvas.parentElement.clientWidth - 40;
  canvas.width  = W;
  canvas.height = 200;
  ctx.clearRect(0, 0, W, 200);
  ctx.save();
  ctx.beginPath();
  ctx.moveTo(60, 108); ctx.lineTo(W - 60, 108);
  ctx.strokeStyle = '#e0e0e0'; ctx.lineWidth = 8; ctx.lineCap = 'round';
  ctx.stroke();
  ctx.restore();
  ctx.font = '700 18px Nunito';
  ctx.fillStyle = '#bbb';
  ctx.textAlign = 'center';
  ctx.fillText('👆 Type a number and press ROUND IT!', W/2, 108);
});

window.addEventListener('resize', () => {
  const raw = input.value.trim();
  if(raw && !isNaN(+raw)) drawNumberLine(+raw, selectedRound);
  else {
    const W = canvas.parentElement.clientWidth - 40;
    canvas.width = W; canvas.height = 200;
    ctx.clearRect(0,0,W,200);
  }
});
</script>
</body>
</html>
